version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: st-henry-db
    environment:
      POSTGRES_USER: sthenry
      POSTGRES_PASSWORD: sthenry123
      POSTGRES_DB: sthenry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sthenry"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
